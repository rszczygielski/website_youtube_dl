version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.10.1

    steps:
      - checkout

      - run:
          name: Instal reqirements
          command: |
            pip install -r requirements.txt

      - run:
          name: Run tests
          command: |
            export PYTHONPATH=:
            coverage run -m pytest --junitxml=results/TestsReport.xml --html=results/TestsReport.html --self-contained-html test/*.py
            coverage html

      - run:
          name: Generate Architecture Diagram
          when: always
          command: |

            echo "Installing system dependencies (Graphviz)..."
            sudo apt-get update && sudo apt-get install -y graphviz

            echo "Installing Python packages (pylint, pydot)..."
            pip3 install pylint pydot

            # Set execute permissions and run the diagram generation script
            chmod +x ./tools/generate_diagrams.sh
            ./tools/generate_diagrams.sh

      - run:
          name: Build and Deploy Documentation
          when: always
          command: |
            # 1. Install MkDocs stack + GLightbox
            pip3 install ghp-import mkdocs mkdocs-material mkdocstrings[python] mkdocs-glightbox

            # 2. Build the static site
            mkdocs build

            # 3. Configure Git identity so ghp-import can create a commit
            git config --global user.email "circleci@circleci.com"
            git config --global user.name "CircleCI Builder"

            # 4. Update the remote URL to include the token for authentication
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git

            # 5. Push the built documentation from 'site' folder to the gh-pages branch
            ghp-import -p -f site

      - store_test_results:
          path: results

      - store_artifacts:
          path: results