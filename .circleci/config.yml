version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.10.1

    steps:
      - checkout

      - run:
          name: Instal reqirements
          command: |
            pip install -r requirements.txt

      - run:
          name: Run tests
          command: |
            export PYTHONPATH=:
            coverage run -m pytest --junitxml=results/TestsReport.xml --html=results/TestsReport.html --self-contained-html test/*.py
            coverage html

      - run:
          name: Generate Architecture Diagram
          when: always
          command: |
            # 1. Install pylint which includes pyreverse
            pip3 install pylint

            # 2. Generate the Mermaid diagram from source code 'mmd' (Mermaid Markdown) format
            pyreverse -o mmd website_youtube_dl/flask_api/

            # 3. Inject the generated diagram into the markdown file
            echo "# 🏗️ Auto-Generated Architecture Diagram" > docs/architecture.md
            echo "This diagram is generated automatically from the source code during the CI/CD pipeline." >> docs/architecture.md
            echo "" >> docs/architecture.md
            echo '```mermaid' >> docs/architecture.md
            cat classes.mmd >> docs/architecture.md
            echo '```' >> docs/architecture.md

      - run:
          name: Build and Deploy Documentation
          when: always
          command: |
            # 1. Install MkDocs stack
            pip3 install ghp-import mkdocs mkdocs-material mkdocstrings[python] mkdocs-panzoom

            # 2. Build the static site
            mkdocs build

            # 3. Configure Git identity so ghp-import can create a commit
            git config --global user.email "circleci@circleci.com"
            git config --global user.name "CircleCI Builder"

            # 4. Update the remote URL to include the token for authentication
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git

            # 5. Push the built documentation from 'site' folder to the gh-pages branch
            ghp-import -p -f site

      - store_test_results:
          path: results

      - store_artifacts:
          path: results